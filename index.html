<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <!-- 移动端优化：禁止双击缩放，防止误触 -->
  <meta name="touch-action" content="manipulation">
  <title>五子棋游戏</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="header-row">
      <h1>五子棋</h1>
      <button id="theme-toggle" class="btn-theme-toggle" title="切换主题">🌙</button>
    </div>

    <!-- 恢复游戏提示 -->
    <div id="restore-prompt" class="restore-prompt hidden">
      <div class="restore-prompt-content">
        <h2>检测到未完成的游戏</h2>
        <p>是否继续上局游戏？</p>
        <div class="restore-buttons">
          <button id="restore-btn" class="btn">继续上局</button>
          <button id="new-game-btn" class="btn btn-secondary">开始新游戏</button>
        </div>
      </div>
    </div>

    <!-- 游戏模式选择界面 -->
    <div id="mode-selection" class="mode-selection">
      <h2>选择游戏模式</h2>
      <div class="mode-buttons">
        <button id="pvp-mode" class="btn mode-btn">双人对弈</button>
        <button id="pve-mode" class="btn mode-btn">人机对战</button>
      </div>
      <div id="difficulty-selection" class="difficulty-selection hidden">
        <h3>选择难度</h3>
        <div class="difficulty-buttons">
          <button class="btn difficulty-btn" data-difficulty="easy">简单</button>
          <button class="btn difficulty-btn" data-difficulty="medium">中等</button>
          <button class="btn difficulty-btn" data-difficulty="hard">困难</button>
        </div>
      </div>
    </div>

    <!-- 游戏界面 -->
    <div id="game-area" class="game-area hidden">
      <div class="game-info">
        <div class="current-player">当前玩家: <span id="player">黑棋</span></div>
        <div id="ai-thinking" class="ai-thinking hidden">AI 思考中...</div>
        <button id="undo" class="btn btn-warning">悔棋</button>
        <button id="restart" class="btn">重新开始</button>
        <button id="back-to-menu" class="btn btn-secondary">返回菜单</button>
      </div>
      <div id="board" class="board"></div>
      <div id="message" class="message"></div>
    </div>
  </div>
  <script type="module" src="main.js"></script>
</body>
</html>
