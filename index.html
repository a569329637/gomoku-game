<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <!-- 移动端优化：禁止双击缩放，防止误触 -->
  <meta name="touch-action" content="manipulation">
  <title>五子棋游戏</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="header-row">
      <h1>五子棋</h1>
      <button id="theme-toggle" class="btn-theme-toggle" title="切换主题">🌙</button>
    </div>

    <!-- 恢复游戏提示 -->
    <div id="restore-prompt" class="restore-prompt hidden">
      <div class="restore-prompt-content">
        <h2>检测到未完成的游戏</h2>
        <p>是否继续上局游戏？</p>
        <div class="restore-buttons">
          <button id="restore-btn" class="btn">继续上局</button>
          <button id="new-game-btn" class="btn btn-secondary">开始新游戏</button>
        </div>
      </div>
    </div>

    <!-- 游戏模式选择界面 -->
    <div id="mode-selection" class="mode-selection">
      <h2>选择游戏模式</h2>
      <div class="mode-buttons">
        <button id="pvp-mode" class="btn mode-btn">双人对弈</button>
        <button id="pve-mode" class="btn mode-btn">人机对战</button>
      </div>
      <div id="difficulty-selection" class="difficulty-selection hidden">
        <h3>选择难度</h3>
        <div class="difficulty-buttons">
          <button class="btn difficulty-btn" data-difficulty="easy">简单</button>
          <button class="btn difficulty-btn" data-difficulty="medium">中等</button>
          <button class="btn difficulty-btn" data-difficulty="hard">困难</button>
        </div>
      </div>
      <!-- 计时模式选择 -->
      <div class="timer-selection">
        <h3>计时模式</h3>
        <div class="timer-mode-buttons">
          <button class="btn timer-mode-btn active" data-timer="none">无限制</button>
          <button class="btn timer-mode-btn" data-timer="total">总时间</button>
          <button class="btn timer-mode-btn" data-timer="per-move">每步限时</button>
        </div>
        <div id="time-config" class="time-config hidden">
          <select id="time-select" class="time-select">
            <option value="5min">5 分钟</option>
            <option value="10min" selected>10 分钟</option>
            <option value="15min">15 分钟</option>
          </select>
        </div>
        <div id="per-move-config" class="time-config hidden">
          <select id="per-move-select" class="time-select">
            <option value="30s">30 秒</option>
            <option value="60s">60 秒</option>
            <option value="90s">90 秒</option>
          </select>
        </div>
      </div>
      <!-- 统计数据展示 -->
      <div class="stats-panel">
        <h3>游戏统计</h3>
        <div id="stats-display" class="stats-display"></div>
        <button id="reset-stats" class="btn btn-secondary btn-small">重置统计</button>
      </div>
    </div>

    <!-- 游戏界面 -->
    <div id="game-area" class="game-area hidden">
      <!-- 计时器显示 -->
      <div id="timer-display" class="timer-display hidden"></div>
      <div class="game-info">
        <div class="current-player">当前玩家: <span id="player">黑棋</span></div>
        <div id="game-stats" class="game-stats"></div>
        <div id="ai-thinking" class="ai-thinking hidden">AI 思考中...</div>
        <button id="undo" class="btn btn-warning">悔棋</button>
        <button id="restart" class="btn">重新开始</button>
        <button id="back-to-menu" class="btn btn-secondary">返回菜单</button>
      </div>
      <div id="board" class="board"></div>
      <div id="message" class="message"></div>
    </div>
  </div>
  <script type="module" src="main.js"></script>
</body>
</html>
